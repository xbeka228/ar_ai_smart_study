name: ar_ai_smart_study
description: AR + AI Smart Study — мобильдік қосымша, камера арқылы оқу материалын тауып, AI түсіндірме береді.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.14.0
  http: ^1.2.1
  provider: ^6.1.2
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3
  lottie: ^3.1.0
  animated_text_kit: ^4.2.2
  flutter_markdown: ^0.7.1
  permission_handler: ^11.3.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/tessdata/
